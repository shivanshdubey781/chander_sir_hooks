<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Wire — Chartlink Feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d0a;
            --bg-raised: #111511;
            --paper: #0e130f;
            --amber: #ffb000;
            --amber-dim: #8a6300;
            --cyan: #4fd1c5;
            --ink: #d8d4c4;
            --ink-dim: #6b6f66;
            --line: #2a2f28;
            --red: #e05a4f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'IBM Plex Mono', monospace;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* CRT scanline overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(to bottom,
                    rgba(255, 255, 255, 0.015) 0px,
                    rgba(255, 255, 255, 0.015) 1px,
                    transparent 1px,
                    transparent 3px);
            z-index: 100;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 99;
        }

        /* Ticker marquee */
        .ticker-bar {
            background: var(--paper);
            border-bottom: 1px solid var(--line);
            overflow: hidden;
            white-space: nowrap;
            padding: 6px 0;
        }

        .ticker-track {
            display: inline-block;
            animation: scroll 30s linear infinite;
            font-size: 12px;
            letter-spacing: 0.05em;
            color: var(--amber-dim);
        }

        .ticker-track span {
            margin-right: 3em;
        }

        .ticker-track .sym {
            color: var(--amber);
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        header {
            padding: 32px 24px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .eyebrow {
            font-size: 11px;
            color: var(--amber-dim);
            letter-spacing: 0.2em;
            margin-bottom: 6px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--amber);
            letter-spacing: 0.03em;
            text-shadow: 0 0 12px rgba(255, 176, 0, 0.25);
        }

        .subhead {
            font-size: 12.5px;
            color: var(--ink-dim);
            margin-top: 6px;
        }

        .statline {
            display: flex;
            gap: 28px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px dashed var(--line);
            flex-wrap: wrap;
        }

        .stat {
            font-size: 11.5px;
            color: var(--ink-dim);
            letter-spacing: 0.04em;
        }

        .stat b {
            color: var(--cyan);
            font-weight: 600;
            display: block;
            font-size: 18px;
            margin-top: 2px;
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--cyan);
            margin-right: 6px;
            box-shadow: 0 0 6px var(--cyan);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 8px 24px 60px;
        }

        .feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .slip {
            background: var(--paper);
            border: 1px solid var(--line);
            position: relative;
            padding: 16px 18px 14px;
            animation: printIn 0.4s ease-out;
        }

        @keyframes printIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* perforated tear edge */
        .slip::before {
            content: "";
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background-image: linear-gradient(to right, var(--line) 50%, transparent 50%);
            background-size: 8px 1px;
        }

        .slip-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px dashed var(--line);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .scan-name {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--amber);
            letter-spacing: 0.02em;
        }

        .fired-at {
            font-size: 10.5px;
            color: var(--ink-dim);
        }

        .row {
            display: flex;
            justify-content: space-between;
            font-size: 12.5px;
            padding: 4px 0;
            border-bottom: 1px dotted rgba(255, 255, 255, 0.05);
        }

        .row:last-of-type {
            border-bottom: none;
        }

        .row .sym {
            color: var(--ink);
            letter-spacing: 0.03em;
        }

        .row .price {
            color: var(--cyan);
            font-weight: 600;
        }

        .row .price::before {
            content: "₹";
            opacity: 0.6;
            margin-right: 1px;
        }

        .slip-foot {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px dashed var(--line);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--ink-dim);
            letter-spacing: 0.04em;
        }

        .sent-badge {
            color: var(--cyan);
        }

        .sent-badge::before {
            content: "✓ ";
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--ink-dim);
            font-size: 13px;
            letter-spacing: 0.05em;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: var(--amber);
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 10.5px;
            color: var(--ink-dim);
            letter-spacing: 0.05em;
            border-top: 1px solid var(--line);
            max-width: 1100px;
            margin: 0 auto;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 21px;
            }

            .statline {
                gap: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="ticker-bar">
        <div class="ticker-track" id="tickerTrack">
            <span class="sym">SIGNAL WIRE</span><span>AWAITING FEED...</span>
        </div>
    </div>

    <header>
        <div class="eyebrow">// LIVE SCREENER RELAY</div>
        <h1>SIGNAL WIRE</h1>
        <div class="subhead">Chartlink scan alerts, relayed to Telegram in real time.</div>

        <div class="statline">
            <div class="stat"><span class="status-dot"></span>STATUS<b id="statStatus">LISTENING</b></div>
            <div class="stat">ALERTS TODAY<b id="statCount">0</b></div>
            <div class="stat">LAST SIGNAL<b id="statLast">—</b></div>
        </div>
    </header>

    <main>
        <div id="feed" class="feed"></div>
        <div id="emptyState" class="empty-state" style="display:none;">
            AWAITING SIGNAL<span class="cursor"></span>
        </div>
    </main>

    <footer>WIRE ID: 195.35.23.125:7012 · REFRESHES EVERY 15S</footer>

    <script>
        const feedEl = document.getElementById('feed');
        const emptyEl = document.getElementById('emptyState');
        const tickerEl = document.getElementById('tickerTrack');
        const statCount = document.getElementById('statCount');
        const statLast = document.getElementById('statLast');

        function renderSlip(r) {
            const stocks = (r.stocks || '').split(',').map(s => s.trim()).filter(Boolean);
            const prices = (r.trigger_prices || '').split(',').map(s => s.trim());
            const rows = stocks.map((s, i) =>
                `<div class="row"><span class="sym">${s}</span><span class="price">${prices[i] || '—'}</span></div>`
            ).join('');

            return `
        <div class="slip">
          <div class="slip-head">
            <span class="scan-name">${r.scan_name || 'Unnamed Scan'}</span>
            <span class="fired-at">${r.triggered_at || ''}</span>
          </div>
          ${rows || '<div class="row"><span class="sym">No symbols parsed</span></div>'}
          <div class="slip-foot">
            <span>${r.received_at || ''}</span>
            <span class="sent-badge">SENT TO TELEGRAM</span>
          </div>
        </div>`;
        }

        function renderTicker(reports) {
            const symbols = reports.slice(0, 8).flatMap(r => (r.stocks || '').split(',').map(s => s.trim())).filter(Boolean);
            if (symbols.length === 0) {
                tickerEl.innerHTML = '<span class="sym">SIGNAL WIRE</span><span>AWAITING FEED...</span>';
                return;
            }
            const items = symbols.map(s => `<span class="sym">${s}</span>`).join('');
            tickerEl.innerHTML = items + items; // duplicate for seamless loop
        }

        async function loadReports() {
            try {
                const res = await fetch('/api/reports');
                const reports = await res.json();

                if (!reports.length) {
                    feedEl.style.display = 'none';
                    emptyEl.style.display = 'block';
                } else {
                    feedEl.style.display = 'grid';
                    emptyEl.style.display = 'none';
                    feedEl.innerHTML = reports.map(renderSlip).join('');
                }

                statCount.textContent = reports.length;
                statLast.textContent = reports[0] ? reports[0].triggered_at : '—';
                renderTicker(reports);
            } catch (e) {
                document.getElementById('statStatus').textContent = 'OFFLINE';
            }
        }

        loadReports();
        setInterval(loadReports, 15000);
    </script>
</body>

</html>
